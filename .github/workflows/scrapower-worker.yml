name: Scrapower Worker (GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      coordinator_url:
        description: "Coordinator URL (HTTPS)"
        required: true
        default: "https://scrapower.talos-int.com"
      worker_id:
        description: "Worker ID"
        required: false
        default: "gh-actions"

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install aiohttp

      - name: Run Worker (Mode B — HTTP pull/submit)
        env:
          COORDINATOR_URL: ${{ inputs.coordinator_url }}
          WORKER_ID: ${{ inputs.worker_id }}
        run: |
          python << 'PYEOF'
          import asyncio, aiohttp, os, uuid, time, hashlib

          COORD = os.environ['COORDINATOR_URL'].rstrip('/')
          WID = os.environ.get('WORKER_ID', f'gh-{uuid.uuid4().hex[:8]}')
          IDLE_TIMEOUT = 300
          POLL = 5
          last_task = time.time()

          CAPABILITIES = {
              "runtimes": ["wasm"],
              "resources": {"cpu_cores": 2, "ram_mb": 7168, "gpu": {"supported": False}},
              "lifecycle": {"mode": "ephemeral", "max_lifetime_sec": 21600},
              "limits": {"max_task_duration_ms": 300000, "max_concurrent_tasks": 1},
          }

          async def main():
              global last_task
              async with aiohttp.ClientSession() as s:
                  while True:
                      try:
                          async with s.post(f"{COORD}/worker/pull",
                              json={"type":"pull","worker_id":WID,"capabilities":CAPABILITIES},
                              timeout=aiohttp.ClientTimeout(total=10)) as r:
                              data = await r.json()
                      except Exception as e:
                          print(f"Pull error: {e}")
                          await asyncio.sleep(POLL)
                          continue

                      task = data.get("task")
                      if not task:
                          if time.time() - last_task > IDLE_TIMEOUT:
                              print(f"Idle {IDLE_TIMEOUT}s — stopping")
                              break
                          await asyncio.sleep(POLL)
                          continue

                      last_task = time.time()
                      tid = task["id"][:12]
                      tok = task["assignment_token"]
                      print(f"Task: {tid}")

                      try:
                          async with s.get(f"{COORD}/blobs/{task['payload']['executable_hash']}") as r:
                              executable = await r.read()
                          async with s.get(f"{COORD}/blobs/{task['payload']['input_hash']}") as r:
                              inp = await r.read()
                      except Exception as e:
                          print(f"  Download failed: {e}")
                          continue

                      try:
                          out = hashlib.sha256(inp).digest()
                          oh = hashlib.sha256(out).hexdigest()
                      except Exception as e:
                          oh, out = "", b""

                      async with s.put(f"{COORD}/blobs?assignment_token={tok}", data=out) as r:
                          pass

                      async with s.post(f"{COORD}/worker/submit",
                          json={"type":"submit","task_id":task["id"],"assignment_token":tok,
                                "result":{"output_hash":oh,"execution_metadata":{"exit_code":0}}},
                          timeout=aiohttp.ClientTimeout(total=10)) as r:
                          result = await r.json()
                      print(f"  Done: accepted={result.get('accepted')}")

                      await asyncio.sleep(POLL)

          asyncio.run(main())
          PYEOF
