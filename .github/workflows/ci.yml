name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Typecheck
        run: mypy src/scrapower/coordinator src/scrapower/worker --ignore-missing-imports

      - name: Unit tests
        run: pytest tests/ -q --ignore=tests/test_distribution.py --ignore=tests/test_gpu.py --ignore=tests/test_python.py --ignore=tests/test_smoke.py --ignore=tests/test_worker_gateway_ws.py
