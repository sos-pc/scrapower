name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          cd worker-browser && npm ci && cd ..

      - name: Lint
        run: ruff check src/ tests/

      - name: Typecheck
        run: mypy src/scrapower/coordinator src/scrapower/worker/client.py --ignore-missing-imports

      - name: Build browser worker
        run: |
          cd worker-browser
          npm run build

      - name: Test
        run: pytest tests/ -q --ignore=tests/test_distribution.py --ignore=tests/test_gpu.py
