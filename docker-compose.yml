# docker-compose.yml — Scrapower coordinator
# Deploy: docker compose up -d --build
# Logs:   docker compose logs -f

services:
  coordinator:
    build: .
    network_mode: host
    restart: unless-stopped
    volumes:
      # Mount host data directory (preserves existing DB on migration)
      - ./data:/app/data
    environment:
      - SCRAPOWER_HOST=0.0.0.0
      - SCRAPOWER_DATA_DIR=/app/data
    env_file:
      - .env
