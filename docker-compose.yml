# docker-compose.yml — Scrapower coordinator + VPN proxy
# Deploy: docker compose up -d --build
# Logs:   docker compose logs -f

services:
  coordinator:
    build: .
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - SCRAPOWER_HOST=0.0.0.0
      - SCRAPOWER_DATA_DIR=/app/data
      - SCRAPOWER_VPN_PROXY=socks5://127.0.0.1:1080
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      - vpn

  vpn:
    build: ./deploy/vpn
    restart: unless-stopped
    ports:
      - "127.0.0.1:1080:1080"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_USER=${SCRAPOWER_VPN_USER:-}
      - VPN_PASS=${SCRAPOWER_VPN_PASS:-}
