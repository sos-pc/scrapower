# Dante SOCKS5 proxy configuration
# Internal use only — exposed on Docker network

logoutput: stderr

internal: 0.0.0.0 port = 1080
external: tun0

# Auth: none (Docker network is trusted)
socksmethod: none

# Allow all — this container is internal-only
client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: connect disconnect error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: connect disconnect error
}
