# Dante SOCKS5 server — proxy for WireGuard tunnel
# No auth: security via rate-limit (iptables) + isolated tunnel

logoutput: stderr

internal: 0.0.0.0 port = 1081
external: wg0

method: none

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: connect
    log: connect disconnect error
}
