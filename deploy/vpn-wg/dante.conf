# Dante SOCKS5 server — WireGuard tunnel proxy
# Auth via PAM (system user scrapower / password from env)
#
# Coordinator: socks5://scrapower:${SOCKS_PASS}@127.0.0.1:1081
# Workers:     socks5://scrapower:${SOCKS_PASS}@scrapower.talos-int.com:1081

logoutput: stderr

internal: 0.0.0.0 port = 1081
external: wg0

socksmethod: username

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: connect
    log: connect disconnect error
}
