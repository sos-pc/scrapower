# Dante SOCKS5 server — authenticated proxy for WireGuard tunnel
#
# Internal: coordinator uses socks5://user:pass@127.0.0.1:1081
# External: workers use socks5://user:pass@scrapower.talos-int.com:1081

logoutput: stderr

internal: 0.0.0.0 port = 1081
external: wg0

# Auth
method: username

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: connect
    log: connect disconnect error
}
