# Scrapower reverse proxy snippet for Caddy.
#
# Workers (Kaggle, Modal, HuggingFace Spaces) connect to the coordinator
# through this reverse proxy. Without this block, external workers get
# connection refused on port 8777.
#
# Usage:
#   1. Copy this block into your Caddyfile
#   2. Replace DOCKER_GATEWAY with your Docker bridge gateway IP
#      (usually 172.18.0.1 — check with: docker network inspect bridge)
#   3. Reload Caddy: docker compose restart caddy
#
# The upstream IP depends on whether the coordinator uses host networking:
#   - network_mode: host  → use the Docker bridge gateway IP
#   - bridged network     → use the coordinator's container name or IP
#
# Example for host networking (Scrapower's default):
#   reverse_proxy 172.18.0.1:8777

scrapower.talos-int.com {
    log {
        output file /var/log/caddy/scrapower-access.log
    }
    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        X-Content-Type-Options "nosniff"
        -Server
    }
    reverse_proxy DOCKER_GATEWAY:8777
    encode gzip
}
