<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapower Worker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #widget {
            width: 100%; height: 100%;
            background: #1a1a2e;
            color: #e0e0e0;
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #status-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #f00;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        #dot.on { background: #0f0; }
        #dot.paused { background: #fa0; }
        #status-text { font-size: 12px; font-weight: 500; }
        #stats { font-size: 11px; line-height: 1.6; color: #888; }
        #consent-overlay {
            position: absolute; inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 8px;
            text-align: center;
            padding: 12px;
        }
        #consent-overlay p { font-size: 11px; color: #888; line-height: 1.4; }
        #consent-overlay.hidden { display: none; }
        #activate-btn {
            padding: 6px 16px;
            border: none; border-radius: 4px;
            background: #238636;
            color: #fff;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }
        #activate-btn:hover { background: #2ea043; }
        #decline-btn {
            padding: 4px 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: transparent;
            color: #888;
            font-size: 10px;
            cursor: pointer;
        }
        #decline-btn:hover { color: #ccc; }
        #toggle-btn {
            padding: 2px 8px;
            border: none; border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            background: #333;
            color: #aaa;
        }
        #toggle-btn:hover { background: #444; }
    </style>
</head>
<body>
    <div id="widget">
        <div id="status-row">
            <div id="dot"></div>
            <span id="status-text">En attente</span>
            <button id="toggle-btn" style="display:none">Pause</button>
        </div>
        <div id="stats">
            Tâches : <span id="tasks-count">0</span>
            | CPU : <span id="cpu-time">0.0</span>s
        </div>
    </div>
    <div id="consent-overlay">
        <p>Contribuer au<br>calcul distribué ?</p>
        <button id="activate-btn">Activer</button>
        <button id="decline-btn">Non merci</button>
    </div>
    <script type="module">
        // ── Consentement ─────────────────────────────────
        const overlay = document.getElementById('consent-overlay');
        const activateBtn = document.getElementById('activate-btn');
        const declineBtn = document.getElementById('decline-btn');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');
        const tasksCount = document.getElementById('tasks-count');
        const cpuTime = document.getElementById('cpu-time');
        const toggleBtn = document.getElementById('toggle-btn');

        const CONSENT_KEY = 'scrapower-consent';
        let consented = localStorage.getItem(CONSENT_KEY) === 'true';
        let active = false;

        function showConsent() {
            overlay.classList.remove('hidden');
            statusText.textContent = 'En attente';
            dot.className = '';
        }

        function hideConsent() {
            overlay.classList.add('hidden');
            toggleBtn.style.display = 'inline-block';
        }

        activateBtn.addEventListener('click', () => {
            consented = true;
            localStorage.setItem(CONSENT_KEY, 'true');
            hideConsent();
            startWorker();
        });

        declineBtn.addEventListener('click', () => {
            localStorage.setItem(CONSENT_KEY, 'false');
            overlay.querySelector('p').textContent = 'Widget désactivé';
            activateBtn.style.display = 'none';
            declineBtn.textContent = 'Réactiver';
            declineBtn.addEventListener('click', () => {
                localStorage.removeItem(CONSENT_KEY);
                location.reload();
            }, { once: true });
        });

        toggleBtn.addEventListener('click', () => {
            if (active) {
                pauseWorker();
            } else {
                resumeWorker();
            }
        });

        // ── Anti-hidden iframe ────────────────────────────
        async function isVisible() {
            return new Promise(resolve => {
                const obs = new IntersectionObserver(([entry]) => {
                    resolve(entry.isIntersecting);
                    obs.disconnect();
                }, { threshold: 0.5 });
                obs.observe(document.body);
                setTimeout(() => { obs.disconnect(); resolve(false); }, 2000);
            });
        }

        // ── Worker ────────────────────────────────────────
        let workerConnected = false;

        async function startWorker() {
            if (!consented) return;
            const visible = await isVisible();
            if (!visible) {
                console.warn('[scrapower] widget hidden, not starting');
                statusText.textContent = 'Widget caché';
                return;
            }
            active = true;
            statusText.textContent = 'Connexion...';
            dot.className = 'paused';

            // Load main worker (same domain, so no CORS issues)
            const script = document.createElement('script');
            script.type = 'module';
            script.src = '/static/worker.js';
            document.head.appendChild(script);

            // Listen for stats from worker (cross-module communication via CustomEvent)
            window.addEventListener('scrapower-stats', (e) => {
                if (e.detail.tasks !== undefined) tasksCount.textContent = e.detail.tasks;
                if (e.detail.cpuTimeSec !== undefined) cpuTime.textContent = e.detail.cpuTimeSec.toFixed(1);
                if (e.detail.connected !== undefined) {
                    workerConnected = e.detail.connected;
                    if (workerConnected) {
                        dot.className = 'on';
                        statusText.textContent = 'Connecté';
                    } else {
                        dot.className = 'paused';
                        statusText.textContent = 'Déconnecté';
                    }
                }
            });
        }

        function pauseWorker() {
            active = false;
            window.dispatchEvent(new CustomEvent('scrapower-pause'));
            dot.className = 'paused';
            statusText.textContent = 'En pause';
            toggleBtn.textContent = 'Activer';
        }

        function resumeWorker() {
            active = true;
            window.dispatchEvent(new CustomEvent('scrapower-resume'));
            dot.className = 'on';
            statusText.textContent = 'Connecté';
            toggleBtn.textContent = 'Pause';
        }

        // ── Init ───────────────────────────────────────────
        if (consented) {
            hideConsent();
            startWorker();
        } else {
            showConsent();
        }
    </script>
</body>
</html>
