# Scrapower Worker — GitHub Actions workflow
# Triggered via workflow_dispatch by the harvester.
# Runs the native Python worker, connects to the coordinator.

name: Scrapower Worker

on:
  workflow_dispatch:
    inputs:
      coordinator_url:
        description: "Coordinator WebSocket URL"
        required: true
        default: "ws://localhost:8777/worker/ws"
      worker_id:
        description: "Worker ID"
        required: false
        default: "gh-actions"

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max (GitHub limit)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Scrapower
        run: |
          pip install aiohttp
          # For now, curl the worker client from the coordinator
          curl -s ${{ inputs.coordinator_url }}/../static/worker.py -o worker.py 2>/dev/null || true

      - name: Run Worker
        env:
          COORDINATOR_URL: ${{ inputs.coordinator_url }}
          WORKER_ID: ${{ inputs.worker_id }}
        run: |
          python -c "
import asyncio, aiohttp, os, sys, uuid

COORDINATOR = os.environ.get('COORDINATOR_URL', 'ws://localhost:8777/worker/ws')
WORKER_ID = os.environ.get('WORKER_ID', f'gh-{uuid.uuid4().hex[:8]}')

async def main():
    ws_url = COORDINATOR.replace('http://', 'ws://').replace('https://', 'wss://')
    if not ws_url.endswith('/worker/ws'):
        ws_url = ws_url.rstrip('/') + '/worker/ws'

    async with aiohttp.ClientSession() as session:
        async with session.ws_connect(ws_url) as ws:
            # Hello
            await ws.send_json({
                'type': 'hello', 'version': '2.1', 'mode': 'persistent',
                'worker_id': WORKER_ID, 'auth': {'method': 'none'},
            })
            msg = await ws.receive_json()
            if msg['type'] != 'session':
                print(f'Expected session, got {msg[\"type\"]}')
                return
            session_id = msg['session_id']
            hb_interval = msg.get('heartbeat_interval_ms', 10000) // 1000
            print(f'Connected: {session_id}')

            # Capabilities
            await ws.send_json({
                'type': 'capabilities', 'session_id': session_id,
                'payload': {
                    'runtimes': ['wasm'],
                    'resources': {'cpu_cores': 2, 'ram_mb': 7168, 'gpu': {'supported': False}},
                    'lifecycle': {'mode': 'ephemeral', 'max_lifetime_sec': 21600},
                    'verification': {'can_challenge': False},
                    'network': {'connectivity': 'outgoing_only'},
                    'limits': {'max_task_duration_ms': 300000, 'max_concurrent_tasks': 1},
                },
            })

            # Main loop
            next_hb = asyncio.get_event_loop().time() + hb_interval
            while True:
                now = asyncio.get_event_loop().time()
                if now >= next_hb:
                    await ws.send_json({
                        'type': 'heartbeat', 'session_id': session_id,
                        'current_load_pct': 0, 'tasks_in_progress': 0,
                        'uptime_sec': 0, 'expected_remaining_sec': None,
                    })
                    next_hb = now + hb_interval
                try:
                    msg = await asyncio.wait_for(ws.receive_json(), timeout=1.0)
                except asyncio.TimeoutError:
                    continue
                except Exception:
                    break

                msg_type = msg.get('type', '')
                if msg_type in ('task_assign', 'keepalive'):
                    if msg_type == 'task_assign':
                        await ws.send_json({
                            'type': 'task_accept', 'session_id': session_id,
                            'task_id': msg['task']['id'],
                            'assignment_token': msg['task']['assignment_token'],
                        })

                    # Download + execute + upload
                    http_url = COORDINATOR.replace('ws://', 'http://').replace('/worker/ws', '')
                    try:
                        async with aiohttp.ClientSession() as s2:
                            async with s2.get(f'{http_url}/blobs/{msg[\"task\"][\"payload\"][\"executable_hash\"]}') as r:
                                executable = await r.read()
                            async with s2.get(f'{http_url}/blobs/{msg[\"task\"][\"payload\"][\"input_hash\"]}') as r:
                                input_data = await r.read()
                            # Execute via wasmtime if available, else mock
                            result = {'output_hash': 'mock'}
                            try:
                                import wasmtime
                                module = wasmtime.Module(executable)
                                instance = wasmtime.Instance(module, [])
                                mem = instance.exports['memory']
                                mem.write_bytes(0, input_data)
                                instance.exports['compute'](0, len(input_data), 1024, 4096)
                                output = bytes(mem.read_bytes(1024, 4096))
                            except Exception:
                                output = input_data[:100]  # mock: echo first 100 bytes

                            import hashlib
                            output_hash = hashlib.sha256(output).hexdigest()
                            async with s2.put(f'{http_url}/blobs', data=output) as r:
                                pass

                        status = 'success'
                        exit_code = 0
                        stderr = ''
                    except Exception as e:
                        output_hash = ''
                        status = 'error'
                        exit_code = 1
                        stderr = str(e)[:4096]

                    await ws.send_json({
                        'type': 'task_result', 'session_id': session_id,
                        'task_id': msg['task']['id'],
                        'assignment_token': msg['task'].get('assignment_token', ''),
                        'status': status,
                        'result': {
                            'output_hash': output_hash,
                            'execution_metadata': {
                                'duration_ms': 0, 'exit_code': exit_code, 'stderr': stderr,
                            },
                        },
                        'verification_data': None,
                    })

asyncio.run(main())
"
