# harvester.yaml — Worker provider configuration
# Each provider manages workers on a free compute platform.

providers:
  # Local workers — always work, no account needed
  - type: local
    name: "local-wasm"
    enabled: true
    count: 2
    runtimes: ["wasm"]

  # Colab GPU — free T4 GPU, ~12h per session
  # - type: colab
  #   name: "colab-gpu"
  #   enabled: false
  #   notebook_path: "./providers/colab_worker.ipynb"
  #   max_sessions: 2
  #   cooldown_minutes: 30
  #   runtime: "python"

  # GitHub Actions — free for public repos (unlimited), 2000min/month private
